<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Crystalward">
  <defs>
    <!-- Deep night well -->
    <radialGradient id="bg" cx="42%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#2a1a3d"/>
      <stop offset="45%" stop-color="#14102a"/>
      <stop offset="100%" stop-color="#07050f"/>
    </radialGradient>

    <!-- Living crystal body: purple → green shimmer -->
    <linearGradient id="crystalBody" x1="18%" y1="8%" x2="88%" y2="96%">
      <stop offset="0%" stop-color="#d4a8ff"/>
      <stop offset="22%" stop-color="#9b6ad4"/>
      <stop offset="48%" stop-color="#5c8f7a"/>
      <stop offset="72%" stop-color="#3d6b5c"/>
      <stop offset="100%" stop-color="#2a1840"/>
    </linearGradient>

    <linearGradient id="crystalFacet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e6ff" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#b8f0d8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6a3d9e" stop-opacity="0.15"/>
    </linearGradient>

    <linearGradient id="thornGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7dcea0"/>
      <stop offset="40%" stop-color="#3d8f6e"/>
      <stop offset="100%" stop-color="#1a3d32"/>
    </linearGradient>

    <linearGradient id="vineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b7ec8"/>
      <stop offset="50%" stop-color="#4a9b78"/>
      <stop offset="100%" stop-color="#2d4a3e"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#e8fff4" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#c4a0ff" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#5a8f7a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2a1840" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="shimmer1" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#d4b8ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="shimmer2" cx="68%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#b8ffe0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#80ffc0" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="outerAura" cx="50%" cy="52%" r="48%">
      <stop offset="0%" stop-color="#8a60c8" stop-opacity="0"/>
      <stop offset="55%" stop-color="#6a4a9e" stop-opacity="0.12"/>
      <stop offset="78%" stop-color="#3d8f6e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1a0f28" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="haze" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
    </filter>

    <!-- Clip to rounded square for app-icon feel -->
    <clipPath id="rounded">
      <rect width="128" height="128" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="128" height="128" fill="url(#bg)"/>

    <!-- Soft outer aura -->
    <ellipse cx="64" cy="70" rx="54" ry="48" fill="url(#outerAura)" filter="url(#haze)"/>

    <!-- Ground moss crescent -->
    <path
      d="M14 108
         C28 92, 48 86, 64 88
         C80 86, 100 92, 114 108
         C100 118, 80 122, 64 120
         C48 122, 28 118, 14 108 Z"
      fill="#1a2e28"
      opacity="0.85"/>
    <path
      d="M22 106
         C36 94, 52 90, 64 92
         C76 90, 92 94, 106 106
         C94 112, 78 114, 64 113
         C50 114, 34 112, 22 106 Z"
      fill="#2d4a3e"
      opacity="0.55"/>

    <!-- Organic root / vine mass under crystal -->
    <g fill="url(#vineGrad)" opacity="0.9">
      <path d="M40 96 C36 82, 30 74, 22 70 C28 76, 32 88, 34 98 Z"/>
      <path d="M48 100 C44 78, 38 64, 28 54 C36 62, 42 76, 46 100 Z"/>
      <path d="M80 100 C84 76, 90 62, 102 52 C92 60, 86 78, 82 100 Z"/>
      <path d="M88 96 C92 84, 98 74, 108 68 C100 76, 96 88, 94 98 Z"/>
      <path d="M56 104 C52 88, 48 70, 44 58 C50 70, 54 88, 58 104 Z"/>
      <path d="M72 104 C76 86, 80 68, 86 56 C80 68, 76 88, 70 104 Z"/>
    </g>

    <!-- Thorn curls left -->
    <g stroke="url(#thornGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.95">
      <path d="M38 78 C28 70, 18 72, 14 64"/>
      <path d="M42 88 C30 86, 20 92, 16 84"/>
      <path d="M46 68 C34 58, 24 52, 20 42"/>
    </g>
    <!-- Thorn barbs left -->
    <g fill="#4a9b78">
      <path d="M20 42 L16 36 L24 40 Z"/>
      <path d="M14 64 L10 58 L18 62 Z"/>
      <path d="M16 84 L11 80 L18 86 Z"/>
    </g>

    <!-- Thorn curls right -->
    <g stroke="url(#thornGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.95">
      <path d="M90 78 C100 70, 110 72, 114 64"/>
      <path d="M86 88 C98 86, 108 92, 112 84"/>
      <path d="M82 68 C94 58, 104 52, 108 42"/>
    </g>
    <g fill="#4a9b78">
      <path d="M108 42 L112 36 L104 40 Z"/>
      <path d="M114 64 L118 58 L110 62 Z"/>
      <path d="M112 84 L117 80 L110 86 Z"/>
    </g>

    <!-- Soft glow behind crystal -->
    <ellipse cx="64" cy="58" rx="28" ry="36" fill="url(#coreGlow)" filter="url(#haze)" opacity="0.85"/>

    <!-- Main organic crystal (irregular faceted gem) -->
    <g filter="url(#softGlow)">
      <path
        d="M64 16
           C72 22, 86 30, 94 42
           C100 52, 102 64, 96 78
           C90 92, 78 104, 64 110
           C50 104, 38 92, 32 78
           C26 64, 28 52, 34 42
           C42 30, 56 22, 64 16 Z"
        fill="url(#crystalBody)"
        stroke="#c8b0e8"
        stroke-width="1.25"
        stroke-opacity="0.55"/>

      <!-- Dark facet ridges -->
      <path
        d="M64 16 L52 48 L64 110 L76 48 Z"
        fill="#1a1028"
        opacity="0.18"/>
      <path
        d="M34 42 L52 48 L64 110 L40 72 Z"
        fill="#0d281f"
        opacity="0.2"/>
      <path
        d="M94 42 L76 48 L64 110 L88 72 Z"
        fill="#2a1840"
        opacity="0.22"/>

      <!-- Bright facet glass -->
      <path
        d="M64 22
           C70 28, 80 34, 88 44
           C84 42, 74 38, 64 48
           C54 38, 44 42, 40 44
           C48 34, 58 28, 64 22 Z"
        fill="url(#crystalFacet)"/>

      <!-- Side gleam -->
      <path
        d="M78 36 C86 44, 92 56, 90 70 C86 62, 80 50, 72 42 Z"
        fill="#e8fff4"
        opacity="0.22"/>
      <path
        d="M50 36 C42 44, 36 56, 38 70 C42 62, 48 50, 56 42 Z"
        fill="#d4b8ff"
        opacity="0.18"/>
    </g>

    <!-- Inner core spark -->
    <ellipse cx="64" cy="56" rx="10" ry="14" fill="url(#coreGlow)" opacity="0.9"/>
    <ellipse cx="62" cy="50" rx="4" ry="6" fill="#f5fff8" opacity="0.75"/>

    <!-- Shimmer overlays -->
    <ellipse cx="52" cy="40" rx="18" ry="22" fill="url(#shimmer1)"/>
    <ellipse cx="78" cy="62" rx="14" ry="16" fill="url(#shimmer2)"/>

    <!-- Specular flecks -->
    <g fill="#ffffff" opacity="0.7">
      <circle cx="54" cy="34" r="1.4"/>
      <circle cx="72" cy="42" r="1.1"/>
      <circle cx="60" cy="64" r="0.9"/>
      <circle cx="70" cy="58" r="0.7" opacity="0.5"/>
    </g>
    <g fill="#b8ffe0" opacity="0.55">
      <circle cx="48" cy="52" r="1.0"/>
      <circle cx="80" cy="48" r="0.8"/>
      <circle cx="66" cy="78" r="0.9"/>
    </g>

    <!-- Tiny leaf / spore motes -->
    <g fill="#7dcea0" opacity="0.45">
      <ellipse cx="30" cy="48" rx="2.5" ry="1.2" transform="rotate(-35 30 48)"/>
      <ellipse cx="98" cy="52" rx="2.2" ry="1.1" transform="rotate(30 98 52)"/>
      <ellipse cx="36" cy="96" rx="2" ry="1" transform="rotate(-20 36 96)"/>
      <ellipse cx="94" cy="94" rx="2.3" ry="1.1" transform="rotate(25 94 94)"/>
    </g>

    <!-- Thin highlight rim on crystal -->
    <path
      d="M64 18
         C71 24, 84 32, 92 44"
      fill="none"
      stroke="#f0e8ff"
      stroke-width="1.4"
      stroke-linecap="round"
      opacity="0.45"/>
  </g>
</svg>
